<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVATECH | ARDA DILMAÇ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAV BAR -->
    <nav class="navbar">
        <div class="menu-left">
            <a href="#" onclick="showPage('home')">HOME</a>
            <a href="#" onclick="showPage('products')">PRODUCTS</a>
            <a href="#" onclick="showPage('contact')">CONTACT</a>
        </div>
        <div class="logo" onclick="showPage('home')">NOVATECH</div>
        <div class="menu-right">
            <a href="#" onclick="toggleCart()">CART (<span id="cart-count">0</span>)</a>
        </div>
    </nav>

    <!-- PAGE: HOME -->
    <section id="home-page" class="page">
        <div class="hero-full">
            <div class="hero-text">
                <h1>NEW COLLECTION</h1>
                <button onclick="showPage('products')">VIEW ALL</button>
            </div>
        </div>
    </section>

    <!-- PAGE: PRODUCTS -->
    <section id="products-page" class="page" style="display:none;">
        <div class="filter-bar">
            <span onclick="filterItems('all')">VIEW ALL</span>
            <span onclick="filterItems('keyboard')">KEYBOARDS</span>
            <span onclick="filterItems('mouse')">MICE</span>
        </div>
        <div id="product-grid" class="product-grid">
            <!-- JS Injection -->
        </div>
    </section>

    <!-- PAGE: CONTACT -->
    <section id="contact-page" class="page" style="display:none;">
        <div class="contact-wrapper">
            <h2>CONTACT US</h2>
            <p>ARDA DILMAÇ</p>
            <p>PIRI REIS UNIVERSITY</p>
            <a href="mailto:arda.dilmac@pirireis.edu.tr">arda.dilmac@pirireis.edu.tr</a>
            
            <form class="contact-form">
                <input type="text" placeholder="NAME">
                <input type="email" placeholder="E-MAIL">
                <textarea placeholder="MESSAGE" rows="5"></textarea>
                <button type="button">SEND</button>
            </form>
        </div>
    </section>

    <!-- CART SIDEBAR -->
    <div id="cart-sidebar" class="cart-sidebar">
        <div class="cart-header">
            <h3>CART</h3>
            <span class="close-cart" onclick="toggleCart()">CLOSE</span>
        </div>
        <div id="cart-items">
            <!-- Cart items here -->
        </div>
        <div class="cart-footer">
            <p>TOTAL: $<span id="cart-total">0.00</span></p>
            <button class="checkout-btn">PROCEED TO CHECKOUT</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
